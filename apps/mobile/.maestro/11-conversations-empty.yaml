appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

# Go to Chat tab (center of tab bar)
- tapOn:
    point: "50%,96%"

- extendedWaitUntil:
    visible:
      text: "Conversations"
    timeout: 5000

- assertVisible:
    id: "no-conversations-text"

# Tap the new conversation button
- tapOn:
    id: "new-conversation-button"

- extendedWaitUntil:
    visible:
      text: "No Books Ready"
    timeout: 5000

- takeScreenshot: "11-no-books-ready"

- tapOn: "OK"
