appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

# Import book
- tapOn: "Import Book"
- tapOn: "From URL"
- extendedWaitUntil:
    visible:
      id: "url-input"
    timeout: 5000
- tapOn:
    id: "url-input"
- inputText: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "dummy"
    timeout: 60000

# Open the book
- tapOn:
    text: "dummy"

- extendedWaitUntil:
    notVisible:
      text: "Loading book..."
    timeout: 15000

# Tap to show toolbar
- tapOn:
    point: "50%,50%"

- takeScreenshot: "09-toolbar-visible"

# Go back
- tapOn:
    point: "10%,7%"

- extendedWaitUntil:
    visible:
      text: "dummy"
    timeout: 10000
