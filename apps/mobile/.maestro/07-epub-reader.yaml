appId: com.rishi.mobile
---
# Test: import a book and open it in the reader
- runFlow: common/launch.yaml

# Import a PDF via URL (fast, reliable test fixture)
- tapOn: "Import Book"
- tapOn: "From URL"
- extendedWaitUntil:
    visible:
      id: "url-input"
    timeout: 5000
- tapOn:
    id: "url-input"
- inputText: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
- pressKey: Enter

- extendedWaitUntil:
    visible:
      text: "dummy"
    timeout: 60000

# Tap the imported book to open reader
- tapOn:
    text: "dummy"

# Wait for reader to load
- extendedWaitUntil:
    notVisible:
      text: "Loading book..."
    timeout: 15000

- takeScreenshot: "07-reader-content"

# Tap screen to show toolbar
- tapOn:
    point: "50%,50%"

- takeScreenshot: "07-reader-toolbar"

# Tap back to return to library
- tapOn:
    point: "10%,7%"

- extendedWaitUntil:
    visible:
      text: "dummy"
    timeout: 15000

- takeScreenshot: "07-back-to-library"
