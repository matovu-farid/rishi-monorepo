appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

# Import a book
- tapOn: "Import Book"
- tapOn: "From URL"
- extendedWaitUntil:
    visible:
      id: "url-input"
    timeout: 5000
- tapOn:
    id: "url-input"
- inputText: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "dummy"
    timeout: 60000

- takeScreenshot: "12-book-imported"

# Tap the delete button (trash icon)
- tapOn:
    id: "book-delete-button"

# Wait for confirmation alert
- extendedWaitUntil:
    visible:
      text: "Delete Book"
    timeout: 5000

# Confirm delete
- tapOn: "Delete"

# Verify book is gone — should show empty state again
- extendedWaitUntil:
    visible:
      text: "No books yet"
    timeout: 5000

- takeScreenshot: "12-book-deleted"
