appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

# Navigate to Chat tab (center of tab bar)
- tapOn:
    point: "50%,96%"

- extendedWaitUntil:
    visible:
      text: "Conversations"
    timeout: 5000

- assertVisible:
    text: "No conversations yet"

- assertVisible:
    text: "Open a book and tap the AI icon to start a conversation."

- takeScreenshot: "10-chat-empty"

# Go back to Library
- tapOn:
    point: "17%,96%"
- extendedWaitUntil:
    visible:
      text: "No books yet"
    timeout: 5000
