appId: com.rishi.mobile
---
# Test the import alert shows all options including From URL
- runFlow: common/launch.yaml

- tapOn: "Import Book"

- assertVisible:
    text: "EPUB"

- assertVisible:
    text: "PDF"

- assertVisible:
    text: "From URL"

- assertVisible:
    text: "Cancel"

- takeScreenshot: "04-import-options"

# Dismiss
- tapOn: "Cancel"
