appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

# Start on Library (empty state)
- assertVisible:
    text: "No books yet"

# Navigate to Chat tab — tap the Chat label in tab bar
- tapOn:
    point: "50%,96%"
- extendedWaitUntil:
    visible:
      text: "Conversations"
    timeout: 5000
- takeScreenshot: "05-chat-tab"

# Navigate to Explore tab
- tapOn:
    point: "83%,96%"
- extendedWaitUntil:
    visible:
      text: "Explore"
    timeout: 5000
- takeScreenshot: "05-explore-tab"

# Back to Library
- tapOn:
    point: "17%,96%"
- extendedWaitUntil:
    visible:
      text: "No books yet"
    timeout: 5000
- takeScreenshot: "05-library-tab"
