appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

- extendedWaitUntil:
    visible:
      text: "Welcome to Rishi"
    timeout: 30000

- runFlow:
    when:
      visible: "Import Book"
    commands:
      # Import a book first
      - tapOn: "Import Book"
      - tapOn: "From URL"
      - tapOn:
          id: "url-input"
      - inputText: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
      - tapOn:
          id: "url-download-button"
      - extendedWaitUntil:
          visible:
            text: "dummy"
          timeout: 60000

      - takeScreenshot: "12-book-imported"

      # Long-press to delete
      - longPressOn:
          text: "dummy"

      # Confirm delete
      - tapOn: "Delete"

      # Verify book is gone — should show empty state again
      - extendedWaitUntil:
          visible:
            text: "No books yet"
          timeout: 5000

      - takeScreenshot: "12-book-deleted"
