appId: com.rishi.mobile
---
- runFlow: common/launch.yaml

# Tap import
- tapOn: "Import Book"

# Wait for alert
- extendedWaitUntil:
    visible:
      text: "From URL"
    timeout: 5000

- tapOn: "From URL"

# Wait for inline sheet
- extendedWaitUntil:
    visible:
      id: "url-input"
    timeout: 5000

# Tap the input to focus it
- tapOn:
    id: "url-input"

# Type URL and press Enter to trigger onSubmitEditing
- inputText: "https://www.gutenberg.org/cache/epub/11/pg11-images.epub"
- pressKey: Enter

# Wait for download
- extendedWaitUntil:
    visible:
      text: "pg11-images"
    timeout: 60000

- takeScreenshot: "06-url-import-success"
